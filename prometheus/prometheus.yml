# Prometheus config for the auto-healing stack.
# Scrape interval is short (10s) so faults are detected quickly during the demo.

global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: auto-healing
    environment: docker

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Demo workloads. We attach the `service` and `environment` labels to every
  # scraped series so alert rules can use them directly instead of parsing
  # the instance label.
  - job_name: demo-services
    metrics_path: /metrics
    static_configs:
      - targets: ['service-a:8000']
        labels:
          service: service-a
          environment: docker
      - targets: ['service-b:8000']
        labels:
          service: service-b
          environment: docker
      - targets: ['service-c:8000']
        labels:
          service: service-c
          environment: docker
