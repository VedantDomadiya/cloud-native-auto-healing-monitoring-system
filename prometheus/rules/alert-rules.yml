# Alert rules for the auto-healing webhook.
# Each rule emits labels the webhook uses to dispatch the right remediation:
#   - service              identifies the workload
#   - autoheal_action      key into the webhook's dispatch table
#   - environment          docker | kubernetes (selects the right client)
#   - severity             routing hint only; the webhook ignores it

groups:

  - name: auto-healing.session-1
    interval: 10s
    rules:

      # S1: a scrape target stays down for 30s => container is gone.
      - alert: ContainerDown
        expr: up{job="demo-services"} == 0
        for: 30s
        labels:
          severity: critical
          autoheal_action: restart_container
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: '{{ $labels.service }} is down on {{ $labels.environment }}'
          description: 'Prometheus has been unable to scrape {{ $labels.service }} for at least 30 seconds. Triggering restart_container.'

  - name: auto-healing.session-2
    interval: 10s
    rules:

      # S2: working-set memory above 90% of the container's memory limit.
      # label_replace projects cAdvisor's `name` label onto a `service` label
      # so the webhook routing picks the right workload.
      - alert: HighMemory
        expr: |
          label_replace(
            container_memory_working_set_bytes{name=~"service-.+"}
              / container_spec_memory_limit_bytes{name=~"service-.+"},
            "service", "$1", "name", "(.+)"
          ) > 0.9
        for: 2m
        labels:
          severity: critical
          autoheal_action: scale_out
          service: '{{ $labels.service }}'
          environment: docker
        annotations:
          summary: '{{ $labels.service }} memory above 90% of limit'

      # S3: CPU usage above 95% of one core for a sustained minute.
      - alert: HighCPU
        expr: |
          label_replace(
            rate(container_cpu_usage_seconds_total{name=~"service-.+"}[1m]),
            "service", "$1", "name", "(.+)"
          ) > 0.95
        for: 1m
        labels:
          severity: critical
          autoheal_action: scale_out
          service: '{{ $labels.service }}'
          environment: docker
        annotations:
          summary: '{{ $labels.service }} CPU above 95%'

      # S4: external blackbox probe failing (HTTP /healthz not returning 200).
      # This is distinct from S1: a service can be scraped (process up,
      # /metrics responding) but still report unhealthy via /healthz.
      - alert: ProbeFailing
        expr: probe_success{job="blackbox-http"} == 0
        for: 30s
        labels:
          severity: critical
          autoheal_action: restart_container
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: 'Probe failing for {{ $labels.service }}'

      # S5: 5xx burst from a service indicates a dependency outage from its
      # perspective. The webhook captures a log snapshot before restarting.
      - alert: DependencyDown
        expr: sum by (service) (rate(http_requests_total{code=~"5.."}[1m])) > 1
        for: 1m
        labels:
          severity: critical
          autoheal_action: capture_snapshot
          service: '{{ $labels.service }}'
          environment: docker
        annotations:
          summary: '{{ $labels.service }} returning 5xx (dependency outage suspected)'
