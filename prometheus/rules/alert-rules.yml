# Alert rules for the auto-healing webhook.
# Each rule emits labels the webhook uses to dispatch the right remediation:
#   - service              identifies the workload
#   - autoheal_action      key into the webhook's dispatch table
#   - environment          docker | kubernetes (selects the right client)
#   - severity             routing hint only; the webhook ignores it

groups:

  - name: auto-healing.session-1
    interval: 10s
    rules:

      # S1: a scrape target stays down for 30s => container is gone.
      - alert: ContainerDown
        expr: up{job="demo-services"} == 0
        for: 30s
        labels:
          severity: critical
          autoheal_action: restart_container
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: '{{ $labels.service }} is down on {{ $labels.environment }}'
          description: 'Prometheus has been unable to scrape {{ $labels.service }} for at least 30 seconds. Triggering restart_container.'

  - name: auto-healing.session-2
    interval: 10s
    rules:

      # S2: resident memory above 230 MiB (~90% of the 256 MiB cgroup limit).
      # We use process_resident_memory_bytes from each service's own
      # /metrics endpoint because cAdvisor on Docker Desktop / WSL2 does
      # not consistently emit per-container memory metrics. The threshold
      # is hardcoded to match the mem_limit set in docker-compose.yml.
      - alert: HighMemory
        expr: process_resident_memory_bytes{job="demo-services"} > 241591910  # 230 MiB
        for: 30s
        labels:
          severity: critical
          autoheal_action: scale_out
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: '{{ $labels.service }} memory above 230 MiB'

      # S3: process CPU usage above 95% of one core for a sustained minute.
      # Same rationale as S2 for using process metrics over cAdvisor.
      - alert: HighCPU
        expr: rate(process_cpu_seconds_total{job="demo-services"}[1m]) > 0.95
        for: 1m
        labels:
          severity: critical
          autoheal_action: scale_out
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: '{{ $labels.service }} CPU above 95% of one core'

      # S4: external blackbox probe failing (HTTP /healthz not returning 200).
      # Distinct from S1: a service may be scraped (process up, /metrics
      # responding) but still report unhealthy via /healthz.
      - alert: ProbeFailing
        expr: probe_success{job="blackbox-http"} == 0
        for: 30s
        labels:
          severity: critical
          autoheal_action: restart_container
          service: '{{ $labels.service }}'
          environment: '{{ $labels.environment }}'
        annotations:
          summary: 'Probe failing for {{ $labels.service }}'

      # S5: 5xx burst from a service indicates a dependency outage. The
      # webhook captures a log snapshot before restarting the dependent.
      - alert: DependencyDown
        expr: sum by (service) (rate(http_requests_total{code=~"5.."}[1m])) > 1
        for: 1m
        labels:
          severity: critical
          autoheal_action: capture_snapshot
          service: '{{ $labels.service }}'
          environment: docker
        annotations:
          summary: '{{ $labels.service }} returning 5xx (dependency outage suspected)'
