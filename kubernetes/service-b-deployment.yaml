---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: demo
  labels: {app: service-b}
spec:
  replicas: 1
  selector:
    matchLabels: {app: service-b}
  template:
    metadata:
      labels:
        app: service-b
        autoheal_environment: kubernetes
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
        - name: service-b
          image: auto-healing/service-b:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: service-b
            - name: UPSTREAM_URL
              # Cluster-local DNS for service-a.
              value: http://service-a.demo.svc.cluster.local:8000
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits: {memory: 256Mi, cpu: '1'}
            requests: {memory: 64Mi, cpu: 100m}
          livenessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /readyz, port: 8000}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
  namespace: demo
  labels: {app: service-b}
spec:
  selector: {app: service-b}
  ports:
    - {name: http, port: 8000, targetPort: 8000}
